<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="nobro.app — workout program tracker">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="nobro">
<meta name="format-detection" content="telephone=no">

<title>nobro.app</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  /* App bar */
  .appbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: #0a0a0a;
    border-bottom: 1px solid #161616;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1;
  }
  .logo {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .logo-no {
    color: #4ade80;
    text-shadow: 0 0 8px rgba(74, 222, 128, 0.45);
  }
  .logo-bro { color: #d4d4d8; }
  .logo-app {
    color: #a1a1aa;
    font-weight: 700;
    font-size: 0.85em;
    margin-left: 1px;
  }
  .tagline {
    font-size: 11px;
    color: #a1a1aa;
    letter-spacing: 0.3px;
    font-weight: 500;
  }
  .appbar-actions {
    display: flex;
    gap: 4px;
  }
  .iconbtn {
    background: none;
    border: none;
    color: #d4d4d8;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .iconbtn:active { background: #1a1a1a; color: #f0f0f0; }
  .iconbtn svg { width: 22px; height: 22px; }

  /* Content wrapper */
  .content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    padding: 16px 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }

  .top {
    font-size: 13px;
    color: #b8b8c0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 16px;
  }
  .bolge {
    font-size: 14px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .hareket {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
  }
  .hareket-link, .hareket-link:visited {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #333;
  }
  .hareket-link::after {
    content: " ↗";
    font-size: 0.4em;
    color: #666;
    vertical-align: super;
    border-bottom: none;
  }
  .summary-row .name a, .summary-row .name a:visited {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #333;
  }
  .hedef {
    font-size: 20px;
    color: #aaa;
  }
  .aciklama {
    font-size: 15px;
    color: #777;
    max-width: 320px;
    line-height: 1.4;
    margin-top: 4px;
  }
  .timer {
    font-size: 96px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: #4ade80;
  }
  .timer-label {
    font-size: 14px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .btn {
    width: 100%;
    max-width: 400px;
    padding: 28px;
    border: none;
    border-radius: 16px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.05s, background 0.15s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-start { background: #4ade80; color: #0a0a0a; }
  .btn-done { background: #f59e0b; color: #0a0a0a; }
  .btn-skip {
    background: transparent;
    color: #666;
    text-transform: none;
    font-weight: 400;
    font-size: 14px;
    padding: 12px;
    margin-top: 8px;
    border: none;
    cursor: pointer;
  }
  .btn-skip:active { color: #999; }
  .summary {
    width: 100%;
    max-width: 400px;
  }
  .summary h2 {
    font-size: 24px;
    margin-bottom: 16px;
    color: #4ade80;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #222;
    font-size: 15px;
  }
  .summary-row .name { color: #ddd; }
  .summary-row .val { color: #888; font-variant-numeric: tabular-nums; }
  .summary-total {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2px solid #333;
    font-weight: 600;
    color: #f0f0f0;
  }
  .empty {
    text-align: center;
    color: #888;
    font-size: 18px;
    line-height: 1.6;
  }
  .empty .big { font-size: 48px; margin-bottom: 16px; }
  .footer {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 16px;
  }

  /* Modal / bottom sheet */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .modal[hidden] { display: none; }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    animation: fadeIn 0.2s ease;
  }
  .modal-sheet {
    position: relative;
    background: #141414;
    border-radius: 20px 20px 0 0;
    padding: 8px 24px 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.6);
  }
  .modal-grabber {
    width: 36px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin: 0 auto 12px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-header h2 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f0f0;
  }
  .modal-close {
    background: none;
    border: none;
    color: #888;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
  }
  .modal-close:active { background: #1f1f1f; color: #f0f0f0; }
  .modal-body {
    color: #aaa;
    font-size: 15px;
    line-height: 1.5;
    min-height: 120px;
  }
  .manifesto {
    text-align: center;
    padding: 8px 0 16px;
  }
  .manifesto-pillars {
    font-size: 18px;
    font-weight: 700;
    color: #4ade80;
    letter-spacing: 0.3px;
    margin-bottom: 18px;
  }
  .manifesto p {
    color: #bbb;
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .manifesto .flow {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #888;
    font-size: 13px;
    background: #1a1a1a;
    padding: 10px 14px;
    border-radius: 8px;
    display: inline-block;
    margin-top: 4px;
  }
  .manifesto .quiet {
    color: #666;
    font-size: 12px;
    margin-top: 18px;
    letter-spacing: 0.2px;
  }

  /* Program editor (Settings) */
  .day-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    scrollbar-width: none;
  }
  .day-pills::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 0 0 auto;
    padding: 8px 14px;
    border: 1px solid #2a2a2a;
    border-radius: 999px;
    background: #1a1a1a;
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .day-pill[aria-pressed="true"] {
    background: #4ade80;
    color: #0a0a0a;
    border-color: #4ade80;
  }
  .day-editor {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ex-card {
    position: relative;
    background: #1a1a1a;
    border: 1px solid #232323;
    border-radius: 12px;
    padding: 12px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ex-card-actions {
    position: absolute;
    top: 6px;
    inset-inline-end: 6px;
    display: flex;
    gap: 2px;
  }
  .ex-card-actions button {
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    color: #777;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .ex-card-actions button:active { background: #2a2a2a; color: #f0f0f0; }
  .ex-card-actions .remove { color: #f87171; }
  .ex-row {
    display: flex;
    gap: 8px;
  }
  .ex-row > * { flex: 1; min-width: 0; }
  .ex-input, .ex-textarea, .ex-num {
    width: 100%;
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 8px 10px;
    color: #f0f0f0;
    font-size: 14px;
    font-family: inherit;
  }
  .ex-input::placeholder, .ex-textarea::placeholder, .ex-num::placeholder { color: #555; }
  .ex-input:focus, .ex-textarea:focus, .ex-num:focus {
    outline: none;
    border-color: #4ade80;
  }
  .ex-textarea {
    resize: vertical;
    min-height: 50px;
    line-height: 1.4;
  }
  .ex-num-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .ex-num-row label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .add-ex-btn {
    margin-top: 12px;
    width: 100%;
    background: transparent;
    border: 1px dashed #333;
    border-radius: 10px;
    padding: 12px;
    color: #888;
    font-size: 14px;
    cursor: pointer;
  }
  .add-ex-btn:active { background: #161616; color: #ddd; }
  .empty-day {
    text-align: center;
    color: #555;
    padding: 24px 0;
    font-size: 13px;
  }
  .program-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .program-actions button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #4ade80; color: #0a0a0a; }
  .btn-secondary {
    background: #1a1a1a;
    color: #d4d4d8;
    border: 1px solid #2a2a2a;
  }
  .program-sep {
    border: none;
    border-top: 1px solid #222;
    margin: 18px 0 14px;
  }
  .program-io {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .program-io button {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    background: #1a1a1a;
    color: #d4d4d8;
    border: 1px solid #2a2a2a;
  }
  .program-io .reset-btn {
    grid-column: 1 / -1;
    color: #f87171;
    border-color: #2a2a2a;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <div class="logo" aria-label="nobro.app">
      <span class="logo-no">no</span><span class="logo-bro">bro</span><span class="logo-app">.app</span>
    </div>
    <div class="tagline" data-i18n="ui.tagline">no thinking. just lift.</div>
  </div>
  <nav class="appbar-actions">
    <button class="iconbtn" id="aboutBtn" data-i18n-aria-label="ui.about" aria-label="About" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
    </button>
    <button class="iconbtn" id="settingsBtn" data-i18n-aria-label="ui.settings" aria-label="Settings" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </nav>
</header>

<div class="content">
  <div class="top">
    <span id="dayInfo"></span>
    <span id="progress"></span>
  </div>

  <div class="main" id="main"></div>

  <div id="bottom"></div>

  <div class="footer" id="footer"></div>
</div>

<div class="modal" id="aboutModal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
    <div class="modal-grabber"></div>
    <div class="modal-header">
      <h2 id="aboutTitle" data-i18n="ui.about">About</h2>
      <button class="modal-close" data-close data-i18n-aria-label="ui.close" aria-label="Close" type="button">×</button>
    </div>
    <div class="modal-body">
      <div class="manifesto">
        <div class="manifesto-pillars" data-i18n="ui.manifesto_pillars">no noise. no ego. no bullshit.</div>
        <p data-i18n="ui.manifesto_intro">A dumbbell program for people who don't want to think. Kills decision fatigue.</p>
        <div class="flow" data-i18n="ui.manifesto_flow">open → do next set → close</div>
        <p class="quiet" data-i18n="ui.manifesto_quiet">no thinking. just lift.</p>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="settingsModal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-grabber"></div>
    <div class="modal-header">
      <h2 id="settingsTitle" data-i18n="ui.edit_program">Edit program</h2>
      <button class="modal-close" data-close data-i18n-aria-label="ui.close" aria-label="Close" type="button">×</button>
    </div>
    <div class="modal-body">
      <div class="day-pills" id="dayPills" role="tablist"></div>
      <div class="day-editor" id="dayEditor"></div>
      <button class="add-ex-btn" id="addExBtn" type="button" data-i18n="ui.add_exercise">+ Add exercise</button>
      <div class="program-actions">
        <button class="btn-primary" id="saveProgramBtn" type="button" data-i18n="ui.save">Save</button>
        <button class="btn-secondary" id="cancelProgramBtn" type="button" data-i18n="ui.cancel">Cancel</button>
      </div>
      <hr class="program-sep">
      <div class="program-io">
        <button id="exportBtn" type="button" data-i18n="ui.export">Export JSON</button>
        <button id="importBtn" type="button" data-i18n="ui.import">Import JSON</button>
        <button class="reset-btn" id="resetProgramBtn" type="button" data-i18n="ui.reset_default">Reset to default</button>
        <input type="file" id="importFile" accept="application/json,.json" hidden>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// Default program (English; not localized — this is content the user edits)
// Days 1..7 = Mon..Sun. Empty array = rest day.
// ============================================
const PUSH = [
  { region: "Chest",        name: "Flat DB Press",       description: "Flat bench. Elbows at 45°, lower under control.", set: 4, reps: "10",  rest: 90 },
  { region: "Upper chest",  name: "Incline DB Press",    description: "30–45° incline. Upper chest focus.",              set: 3, reps: "12",  rest: 90 },
  { region: "Lower chest",  name: "Decline DB Press",    description: "Decline bench. Lower chest.",                     set: 3, reps: "10",  rest: 90 },
  { region: "Shoulders",    name: "DB Shoulder Press",   description: "Press overhead, lock the elbows out.",            set: 4, reps: "10",  rest: 90 },
  { region: "Side delts",   name: "Lateral Raises",      description: "Slight elbow bend, raise to shoulder height.",    set: 3, reps: "15",  rest: 60 },
  { region: "Front delts",  name: "Front Raises",        description: "Raise straight forward, stop at shoulder height.",set: 3, reps: "12",  rest: 60 },
  { region: "Triceps",      name: "Skull Crushers",      description: "Lying back. Elbows fixed, only forearms move.",   set: 3, reps: "12",  rest: 60 },
  { region: "Triceps",      name: "Overhead Triceps",    description: "DB behind the head, elbows tucked in.",           set: 3, reps: "15",  rest: 60 },
  { region: "Triceps",      name: "Diamond Push-ups",    description: "Hands in a diamond. Go to failure.",              set: 3, reps: "Max", rest: 60 },
];
const PULL = [
  { region: "Back",         name: "Bent-Over Row",       description: "Flat back, hips back. Pull toward the belly.",    set: 4, reps: "10",  rest: 90 },
  { region: "Back",         name: "Single-Arm Row",      description: "One arm. Squeeze the shoulder blade.",            set: 3, reps: "12",  rest: 75 },

  { region: "Traps",        name: "DB Shrugs",           description: "Just shrug the shoulders, arms relaxed.",         set: 4, reps: "15",  rest: 60 },
  { region: "Rear delts",   name: "Rear Delt Flies",     description: "Bent over, open arms wide. Squeeze.",             set: 3, reps: "15",  rest: 60 },
  { region: "Biceps",       name: "Bicep Curls",         description: "Elbows pinned at the sides.",                     set: 4, reps: "12",  rest: 60 },

  { region: "Forearms",     name: "Wrist Curls",         description: "Wrist curl. Palms up.",                           set: 3, reps: "20",  rest: 45 },
  { region: "Forearms",     name: "Reverse Wrist",       description: "Reverse wrist curl. Palms down.",                 set: 3, reps: "20",  rest: 45 },
];
const LEGS_CORE = [
  { region: "Quads",        name: "Goblet Squats",       description: "DB at the chest. Heels down, hips back.",         set: 4, reps: "12",  rest: 90 },
  { region: "Quads",        name: "Bulgarian Split",     description: "Rear foot elevated. Single-leg squat.",           set: 3, reps: "12",  rest: 75 },
  { region: "Hamstrings",   name: "Romanian DL",         description: "Push hips back, flat back, soft knees.",          set: 4, reps: "10",  rest: 90 },
  { region: "Legs",         name: "Walking Lunges",      description: "Lunges forward. Each leg.",                       set: 3, reps: "12",  rest: 75 },
  { region: "Legs",         name: "Step-ups",            description: "Step up onto a box/chair. Each leg.",             set: 3, reps: "12",  rest: 60 },
  { region: "Calves",       name: "Calf Raises",         description: "Up on the toes, lower under control.",            set: 4, reps: "20",  rest: 45 },
  { region: "Abs",          name: "Plank",               description: "Hold 60 seconds. Body in a straight line.",       set: 3, reps: "60s", rest: 45 },
  { region: "Obliques",     name: "Russian Twists",      description: "Seated, twist torso side to side. 20 total.",     set: 3, reps: "20",  rest: 45 },
  { region: "Lower abs",    name: "Leg Raises",          description: "Lying back. Raise legs under control.",           set: 3, reps: "15",  rest: 45 },
  { region: "Obliques",     name: "Side Plank",          description: "Hold 30 seconds. Each side.",                     set: 3, reps: "30s", rest: 45 },
];
const DEFAULT_PROGRAM = {
  1: PUSH,        // Monday
  2: PULL,        // Tuesday
  3: LEGS_CORE,   // Wednesday
  4: PUSH,        // Thursday
  5: PULL,        // Friday
  6: LEGS_CORE,   // Saturday
  7: [],          // Sunday — rest
};

// ============================================
// Program storage (localStorage if user customized; otherwise default)
// ============================================
const PROGRAM_KEY = 'nobro_program_v1';
const PROGRAM_VERSION = 1;

function deepClone(x) { return JSON.parse(JSON.stringify(x)); }

function isValidProgramDays(days) {
  if (!days || typeof days !== 'object') return false;
  for (const k of ['1','2','3','4','5','6','7']) {
    const arr = days[k];
    if (!Array.isArray(arr)) return false;
    for (const e of arr) {
      if (!e || typeof e !== 'object') return false;
      if (typeof e.region !== 'string') return false;
      if (typeof e.name !== 'string') return false;
      if (typeof e.description !== 'string') return false;
      if (typeof e.set !== 'number' || e.set < 1) return false;
      if (typeof e.reps !== 'string' && typeof e.reps !== 'number') return false;
      if (typeof e.rest !== 'number' || e.rest < 0) return false;
    }
  }
  return true;
}

function loadProgram() {
  try {
    const raw = localStorage.getItem(PROGRAM_KEY);
    if (!raw) return deepClone(DEFAULT_PROGRAM);
    const parsed = JSON.parse(raw);
    const days = parsed && parsed.days ? parsed.days : null;
    if (!isValidProgramDays(days)) return deepClone(DEFAULT_PROGRAM);
    // Coerce numeric reps to string for consistency.
    for (const k of ['1','2','3','4','5','6','7']) {
      days[k].forEach(e => { if (typeof e.reps === 'number') e.reps = String(e.reps); });
    }
    return days;
  } catch (e) {
    return deepClone(DEFAULT_PROGRAM);
  }
}

function saveCustomProgram(days) {
  localStorage.setItem(PROGRAM_KEY, JSON.stringify({ version: PROGRAM_VERSION, days }));
}

let PROGRAM = loadProgram();

// ============================================
// i18n
// ============================================
const SUPPORTED_LOCALES = ['en', 'tr', 'zh', 'hi', 'es', 'fr', 'ar', 'bn', 'ru', 'pt', 'id'];
const FALLBACK_LOCALE = 'en';
let translations = null;
let fallbackTranslations = null;
let currentLocale = FALLBACK_LOCALE;

function detectLocale() {
  const stored = (() => {
    try { return localStorage.getItem('nobro_locale'); } catch (e) { return null; }
  })();
  if (stored && SUPPORTED_LOCALES.includes(stored)) return stored;

  const langs = (navigator.languages && navigator.languages.length)
    ? navigator.languages
    : [navigator.language || FALLBACK_LOCALE];
  for (const l of langs) {
    const code = (l || '').toLowerCase().split('-')[0];
    if (SUPPORTED_LOCALES.includes(code)) return code;
  }
  return FALLBACK_LOCALE;
}

async function fetchLocale(locale) {
  const res = await fetch(`./locales/${locale}.json`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`locale ${locale} not found`);
  return res.json();
}

async function loadLocale(locale) {
  try {
    return await fetchLocale(locale);
  } catch (e) {
    if (locale !== FALLBACK_LOCALE) return fetchLocale(FALLBACK_LOCALE);
    throw e;
  }
}

function lookup(obj, key) {
  if (!obj) return undefined;
  const parts = key.split('.');
  let v = obj;
  for (const p of parts) {
    if (v && typeof v === 'object' && p in v) v = v[p];
    else return undefined;
  }
  return v;
}

function interpolate(str, vars) {
  if (typeof str !== 'string' || !vars) return str;
  return str.replace(/\{(\w+)\}/g, (_, k) => (vars[k] != null ? vars[k] : `{${k}}`));
}

function t(key, vars) {
  let v = lookup(translations, key);
  if (v === undefined) v = lookup(fallbackTranslations, key);
  if (v === undefined) return key;
  return interpolate(v, vars);
}

function applyStaticTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
    el.setAttribute('aria-label', t(el.getAttribute('data-i18n-aria-label')));
  });
  const titleKey = 'ui.title';
  const title = t(titleKey);
  if (title && title !== titleKey) document.title = title;
}

async function initI18n() {
  currentLocale = detectLocale();
  if (currentLocale !== FALLBACK_LOCALE) {
    try { fallbackTranslations = await fetchLocale(FALLBACK_LOCALE); } catch (e) {}
  }
  try {
    translations = await loadLocale(currentLocale);
  } catch (e) {
    translations = fallbackTranslations || {};
    currentLocale = FALLBACK_LOCALE;
  }
  if (!fallbackTranslations) fallbackTranslations = translations;

  const dir = (translations.meta && translations.meta.dir) || 'ltr';
  document.documentElement.lang = currentLocale;
  document.documentElement.dir = dir;
  applyStaticTranslations();
}

// ============================================
// State (today's progress)
// ============================================
const STORAGE_KEY = 'idman_state_v1';

function gunNo() {
  const d = new Date().getDay();
  return d === 0 ? 7 : d;
}

function bugunKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.tarih === bugunKey()) return s;
    }
  } catch (e) {}
  return {
    tarih: bugunKey(),
    gun: gunNo(),
    hareketIdx: 0,
    setIdx: 0,
    setBitisleri: [],
    baslangic: null,
    bitis: null,
  };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}

let state = loadState();
let timerInterval = null;
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
});

let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 0.6;
    const now = audioCtx.currentTime;
    [880, 1320].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, now + i * 0.25);
      gain.gain.linearRampToValueAtTime(0.3, now + i * 0.25 + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + i * 0.25 + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.25);
      osc.stop(now + i * 0.25 + dur);
    });
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  } catch (e) {}
}

function fmt(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function fmtSure(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return t('duration.h_m', { h, m });
  return t('duration.m_s', { m, s });
}

function dayShort(n) {
  const arr = lookup(translations, 'days_short') || lookup(fallbackTranslations, 'days_short') || [];
  return arr[n] || '';
}

function ytUrl(name) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(name + ' form')}`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function render() {
  const main = document.getElementById('main');
  const bottom = document.getElementById('bottom');
  const dayInfo = document.getElementById('dayInfo');
  const progress = document.getElementById('progress');
  const footer = document.getElementById('footer');

  const program = PROGRAM[state.gun] || [];
  dayInfo.textContent = t('ui.day_label', { day: dayShort(state.gun), n: state.gun });
  footer.textContent = '';

  if (program.length === 0) {
    progress.textContent = '';
    const tomorrow = state.gun === 7 ? 1 : state.gun + 1;
    main.innerHTML = `<div class="empty"><div class="big">${t('ui.rest_day_emoji')}</div>${escapeHtml(t('ui.rest_day'))}<br>${escapeHtml(t('ui.rest_day_tomorrow', { day: dayShort(tomorrow) }))}</div>`;
    bottom.innerHTML = '';
    return;
  }

  if (state.hareketIdx >= program.length) {
    progress.textContent = t('ui.progress_done');
    renderOzet(program);
    return;
  }

  const item = program[state.hareketIdx];
  progress.textContent = t('ui.progress', {
    cur: state.hareketIdx + 1,
    total: program.length,
    set: state.setIdx + 1,
    sets: item.set,
  });

  main.innerHTML = `
    <div class="bolge">${escapeHtml(item.region)}</div>
    <div class="hareket"><a class="hareket-link" href="${ytUrl(item.name)}" target="_blank" rel="noopener">${escapeHtml(item.name)}</a></div>
    <div class="hedef">${escapeHtml(t('ui.rep_set', { reps: item.reps, set: state.setIdx + 1, total: item.set }))}</div>
    <div class="aciklama">${escapeHtml(item.description)}</div>
  `;

  bottom.innerHTML = `<button class="btn btn-start" id="startBtn">${escapeHtml(t('ui.start'))}</button>`;
  document.getElementById('startBtn').addEventListener('click', onStart);
}

function onStart() {
  if (!state.baslangic) {
    state.baslangic = Date.now();
  }
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  requestWakeLock();
  saveState(state);

  const program = PROGRAM[state.gun];
  const item = program[state.hareketIdx];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="bolge">${escapeHtml(item.region)}</div>
    <div class="hareket"><a class="hareket-link" href="${ytUrl(item.name)}" target="_blank" rel="noopener">${escapeHtml(item.name)}</a></div>
    <div class="hedef">${escapeHtml(t('ui.rep_set_doing', { reps: item.reps, set: state.setIdx + 1, total: item.set }))}</div>
    <div class="timer-label">${escapeHtml(t('ui.set_duration'))}</div>
    <div class="timer" id="setTimer" style="color:#f59e0b;">0:00</div>
  `;
  document.getElementById('bottom').innerHTML = `<button class="btn btn-done" id="doneBtn">${escapeHtml(t('ui.done'))}</button>`;
  document.getElementById('doneBtn').addEventListener('click', onDone);

  const setBaslangic = Date.now();
  const setTimerEl = document.getElementById('setTimer');
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const gecen = Math.floor((Date.now() - setBaslangic) / 1000);
    if (setTimerEl) setTimerEl.textContent = fmt(gecen);
  }, 1000);
}

function onDone() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const program = PROGRAM[state.gun];
  const item = program[state.hareketIdx];

  state.setBitisleri.push({
    hareketIdx: state.hareketIdx,
    name: item.name,
    setIdx: state.setIdx,
    ts: Date.now(),
  });

  state.setIdx++;
  if (state.setIdx >= item.set) {
    state.setIdx = 0;
    state.hareketIdx++;
  }

  if (state.hareketIdx >= program.length) {
    state.bitis = Date.now();
    saveState(state);
    render();
    return;
  }

  saveState(state);
  startDinlenme(item.rest);
}

function startDinlenme(saniye) {
  let kalan = saniye;
  const main = document.getElementById('main');
  const bottom = document.getElementById('bottom');

  function tik() {
    main.innerHTML = `
      <div class="timer-label">${escapeHtml(t('ui.rest'))}</div>
      <div class="timer">${fmt(kalan)}</div>
      <div class="aciklama">${escapeHtml(t('ui.rest_hint'))}</div>
    `;
    bottom.innerHTML = `<button class="btn-skip" id="skipBtn">${escapeHtml(t('ui.skip_rest'))}</button>`;
    document.getElementById('skipBtn').addEventListener('click', () => {
      clearInterval(timerInterval);
      timerInterval = null;
      render();
    });
  }

  tik();
  timerInterval = setInterval(() => {
    kalan--;
    if (kalan <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      beep();
      render();
      return;
    }
    tik();
  }, 1000);
}

function renderOzet(program) {
  // Count completed sets per exercise *index* in today's program (robust to name edits).
  const sayim = {};
  state.setBitisleri.forEach(b => {
    const k = b.hareketIdx;
    sayim[k] = (sayim[k] || 0) + 1;
  });

  const sure = state.bitis && state.baslangic ? state.bitis - state.baslangic : 0;
  const toplamSet = state.setBitisleri.length;

  let rows = '';
  program.forEach((h, idx) => {
    const yapilan = sayim[idx] || 0;
    rows += `<div class="summary-row"><span class="name"><a href="${ytUrl(h.name)}" target="_blank" rel="noopener">${escapeHtml(h.name)}</a></span><span class="val">${yapilan}/${h.set}</span></div>`;
  });

  document.getElementById('main').innerHTML = `
    <div class="summary">
      <h2>${escapeHtml(t('ui.today_done'))}</h2>
      ${rows}
      <div class="summary-row summary-total"><span class="name">${escapeHtml(t('ui.total_sets'))}</span><span class="val">${toplamSet}</span></div>
      <div class="summary-row"><span class="name">${escapeHtml(t('ui.duration'))}</span><span class="val">${escapeHtml(fmtSure(sure))}</span></div>
    </div>
  `;
  document.getElementById('bottom').innerHTML = '';
  document.getElementById('footer').innerHTML = `<a href="#" id="resetLink" style="color:#444;text-decoration:none;">${escapeHtml(t('ui.reset'))}</a>`;
  document.getElementById('resetLink').addEventListener('click', (e) => {
    e.preventDefault();
    if (confirm(t('ui.reset_confirm'))) {
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      render();
    }
  });
}

window.addEventListener('beforeunload', () => {
  if (timerInterval) clearInterval(timerInterval);
  saveState(state);
});

// ============================================
// Modal control
// ============================================
function openModal(id) {
  const m = document.getElementById(id);
  if (m) m.hidden = false;
}
function closeModal(m) { m.hidden = true; }

document.getElementById('aboutBtn').addEventListener('click', () => openModal('aboutModal'));
document.getElementById('settingsBtn').addEventListener('click', () => openSettings());

document.querySelectorAll('.modal').forEach((m) => {
  m.querySelectorAll('[data-close]').forEach((el) => {
    el.addEventListener('click', () => closeModal(m));
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal:not([hidden])').forEach(closeModal);
  }
});

// ============================================
// Program editor (Settings)
// ============================================
let programDraft = null;
let editingDay = 1;

function openSettings() {
  programDraft = deepClone(PROGRAM);
  editingDay = state.gun || 1;
  renderDayPills();
  renderDayEditor();
  openModal('settingsModal');
}

function renderDayPills() {
  const wrap = document.getElementById('dayPills');
  let html = '';
  for (let d = 1; d <= 7; d++) {
    const active = d === editingDay;
    html += `<button class="day-pill" type="button" role="tab" aria-pressed="${active}" data-day="${d}">${escapeHtml(dayShort(d))}</button>`;
  }
  wrap.innerHTML = html;
}

function renderDayEditor() {
  const wrap = document.getElementById('dayEditor');
  const arr = programDraft[editingDay] || [];
  if (arr.length === 0) {
    wrap.innerHTML = `<div class="empty-day">${escapeHtml(t('ui.no_exercises'))}</div>`;
    return;
  }
  let html = '';
  arr.forEach((ex, idx) => {
    html += `
      <div class="ex-card" data-idx="${idx}">
        <div class="ex-card-actions">
          <button type="button" data-action="up" data-i18n-aria-label="ui.move_up" aria-label="${escapeHtml(t('ui.move_up'))}">↑</button>
          <button type="button" data-action="down" data-i18n-aria-label="ui.move_down" aria-label="${escapeHtml(t('ui.move_down'))}">↓</button>
          <button type="button" class="remove" data-action="remove" data-i18n-aria-label="ui.remove" aria-label="${escapeHtml(t('ui.remove'))}">×</button>
        </div>
        <div class="ex-row">
          <input class="ex-input" type="text" data-field="region" value="${escapeHtml(ex.region)}" placeholder="${escapeHtml(t('ui.region_label'))}">
          <input class="ex-input" type="text" data-field="name" value="${escapeHtml(ex.name)}" placeholder="${escapeHtml(t('ui.exercise_label'))}">
        </div>
        <textarea class="ex-textarea" data-field="description" placeholder="${escapeHtml(t('ui.description_label'))}" rows="2">${escapeHtml(ex.description)}</textarea>
        <div class="ex-num-row">
          <label>${escapeHtml(t('ui.sets_label'))}<input class="ex-num" type="number" min="1" data-field="set" value="${ex.set}"></label>
          <label>${escapeHtml(t('ui.reps_label'))}<input class="ex-num" type="text" data-field="reps" value="${escapeHtml(ex.reps)}"></label>
          <label>${escapeHtml(t('ui.rest_label'))}<input class="ex-num" type="number" min="0" data-field="rest" value="${ex.rest}"></label>
        </div>
      </div>
    `;
  });
  wrap.innerHTML = html;
}

document.getElementById('dayPills').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-day]');
  if (!btn) return;
  editingDay = +btn.dataset.day;
  renderDayPills();
  renderDayEditor();
});

document.getElementById('dayEditor').addEventListener('input', (e) => {
  const card = e.target.closest('.ex-card');
  if (!card) return;
  const idx = +card.dataset.idx;
  const field = e.target.dataset.field;
  if (!field) return;
  const arr = programDraft[editingDay];
  if (!arr || !arr[idx]) return;
  let val = e.target.value;
  if (field === 'set' || field === 'rest') {
    const n = parseInt(val, 10);
    val = Number.isFinite(n) && n >= 0 ? n : 0;
    if (field === 'set' && val < 1) val = 1;
  }
  arr[idx][field] = val;
});

document.getElementById('dayEditor').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const card = e.target.closest('.ex-card');
  if (!card) return;
  const idx = +card.dataset.idx;
  const arr = programDraft[editingDay];
  const action = btn.dataset.action;
  if (action === 'remove') arr.splice(idx, 1);
  else if (action === 'up' && idx > 0) [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
  else if (action === 'down' && idx < arr.length - 1) [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
  renderDayEditor();
});

document.getElementById('addExBtn').addEventListener('click', () => {
  programDraft[editingDay].push({
    region: '', name: '', description: '', set: 3, reps: '10', rest: 60
  });
  renderDayEditor();
});

document.getElementById('saveProgramBtn').addEventListener('click', () => {
  // Coerce numeric fields and persist.
  for (const k of ['1','2','3','4','5','6','7']) {
    programDraft[k].forEach(e => {
      e.set = Math.max(1, parseInt(e.set, 10) || 1);
      e.rest = Math.max(0, parseInt(e.rest, 10) || 0);
      if (typeof e.reps !== 'string') e.reps = String(e.reps);
    });
  }
  saveCustomProgram(programDraft);
  PROGRAM = loadProgram();
  programDraft = null;
  closeModal(document.getElementById('settingsModal'));
  render();
});

document.getElementById('cancelProgramBtn').addEventListener('click', () => {
  programDraft = null;
  closeModal(document.getElementById('settingsModal'));
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const data = { version: PROGRAM_VERSION, days: programDraft || PROGRAM };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nobro-program.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const days = parsed && parsed.days ? parsed.days : parsed;
    // Coerce numeric reps to string before validating.
    if (days && typeof days === 'object') {
      for (const k of ['1','2','3','4','5','6','7']) {
        if (Array.isArray(days[k])) {
          days[k].forEach(en => { if (en && typeof en.reps === 'number') en.reps = String(en.reps); });
        }
      }
    }
    if (!isValidProgramDays(days)) throw new Error('invalid');
    saveCustomProgram(days);
    PROGRAM = loadProgram();
    programDraft = deepClone(PROGRAM);
    renderDayEditor();
  } catch (err) {
    alert(t('ui.import_error'));
  }
});

document.getElementById('resetProgramBtn').addEventListener('click', () => {
  if (!confirm(t('ui.reset_default_confirm'))) return;
  localStorage.removeItem(PROGRAM_KEY);
  PROGRAM = loadProgram();
  programDraft = deepClone(PROGRAM);
  renderDayEditor();
});

// ============================================
// PWA — service worker
// ============================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ============================================
// Boot
// ============================================
(async () => {
  await initI18n();
  render();
  requestWakeLock();
})();
</script>
