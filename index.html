<style>

<script>
// ============================================
// PROGRAM (01.10.2025 - 31.12.2025)
// Pazartesi=1, Salı=2, Çarşamba=3, Perşembe=4, Cuma=5, Cumartesi=6, Pazar=7
// ============================================

const PUSH = [
  { bolge: "Göğüs",    hareket: "Flat DB Press",       aciklama: "Yatık. Dirsekler 45°, kontrollü in.",       set: 4, tekrar: "10",  dinlenme: 90 },

  { bolge: "Alt göğüs", hareket: "Decline DB Press",   aciklama: "Aşağı eğim. Alt göğüs.",                    set: 3, tekrar: "10",  dinlenme: 90 },
  { bolge: "Omuz",     hareket: "DB Shoulder Press",   aciklama: "Bar başın üstüne, dirsekler kilitlensin.",  set: 4, tekrar: "10",  dinlenme: 90 },
  { bolge: "Yan omuz", hareket: "Lateral Raises",      aciklama: "Dirsekler hafif bükülü, yatay hizaya.",     set: 3, tekrar: "15",  dinlenme: 60 },
  { bolge: "Ön omuz",  hareket: "Front Raises",        aciklama: "Düz öne, omuz hizasında dur.",              set: 3, tekrar: "12",  dinlenme: 60 },
  { bolge: "Triceps",  hareket: "Skull Crushers",      aciklama: "Sırtüstü. Dirsekler sabit, sadece önkol.",  set: 3, tekrar: "12",  dinlenme: 60 },
  { bolge: "Triceps",  hareket: "Overhead Triceps",    aciklama: "DB başın arkasına, dirsekler dar.",         set: 3, tekrar: "15",  dinlenme: 60 },
  { bolge: "Triceps",  hareket: "Diamond Push-ups",    aciklama: "Eller elmas. Tükenene kadar.",              set: 3, tekrar: "Max", dinlenme: 60 },
];

const PULL = [
  { bolge: "Sırt",       hareket: "Bent-Over Row",   aciklama: "Sırt düz, kalça arkaya. Karna doğru çek.",  set: 4, tekrar: "10",  dinlenme: 90 },
  { bolge: "Sırt",       hareket: "Single-Arm Row",  aciklama: "Tek kol. Kürek kemiğini sık.",              set: 3, tekrar: "12",  dinlenme: 75 },
  { bolge: "Sırt+Göğüs", hareket: "DB Pullover",     aciklama: "Sırtüstü. DB başın üstünden geriye.",       set: 3, tekrar: "15",  dinlenme: 75 },
  { bolge: "Trapez",     hareket: "DB Shrugs",       aciklama: "Sadece omuz silkme, kollar gevşek.",        set: 4, tekrar: "15",  dinlenme: 60 },
  { bolge: "Arka omuz",  hareket: "Rear Delt Flies", aciklama: "Eğil, kolları yana aç. Sıkıştır.",          set: 3, tekrar: "15",  dinlenme: 60 },
  { bolge: "Biceps",     hareket: "Bicep Curls",     aciklama: "Dirsekler gövdede sabit.",                  set: 4, tekrar: "12",  dinlenme: 60 },
  { bolge: "Biceps",     hareket: "Hammer Curls",    aciklama: "Nötr tutuş, çekiç gibi.",                   set: 3, tekrar: "15",  dinlenme: 60 },
  { bolge: "Ön kol",     hareket: "Wrist Curls",     aciklama: "Bilek bükme. Avuç yukarı.",                 set: 3, tekrar: "20",  dinlenme: 45 },
  { bolge: "Ön kol",     hareket: "Reverse Wrist",   aciklama: "Ters bilek bükme. Avuç aşağı.",             set: 3, tekrar: "20",  dinlenme: 45 },
];

const LEGS_CORE = [
  { bolge: "Quad",      hareket: "Goblet Squats",   aciklama: "DB göğüste. Topuk yere basılı, kalça arkaya.", set: 4, tekrar: "12",  dinlenme: 90 },
  { bolge: "Quad",      hareket: "Bulgarian Split", aciklama: "Arka ayak yüksekte. Tek bacak çömel.",         set: 3, tekrar: "12",  dinlenme: 75 },
  { bolge: "Hamstring", hareket: "Romanian DL",     aciklama: "Kalçayı arkaya it, sırt düz, dizler hafif.",   set: 4, tekrar: "10",  dinlenme: 90 },
  { bolge: "Bacak",     hareket: "Walking Lunges",  aciklama: "Yürüyerek hamle. Her bacak için.",             set: 3, tekrar: "12",  dinlenme: 75 },
  { bolge: "Bacak",     hareket: "Step-ups",        aciklama: "Kasaya/sandalyeye çık-in. Her bacak için.",    set: 3, tekrar: "12",  dinlenme: 60 },
  { bolge: "Baldır",    hareket: "Calf Raises",     aciklama: "Parmak ucuna kalk, kontrollü in.",             set: 4, tekrar: "20",  dinlenme: 45 },
  { bolge: "Karın",     hareket: "Plank",           aciklama: "60 saniye tut. Vücut düz çizgi.",              set: 3, tekrar: "60s", dinlenme: 45 },
  { bolge: "Oblik",     hareket: "Russian Twists",  aciklama: "Oturarak gövde sağ-sol döndür. 20 toplam.",    set: 3, tekrar: "20",  dinlenme: 45 },
  { bolge: "Alt karın", hareket: "Leg Raises",      aciklama: "Sırtüstü. Bacakları kontrollü kaldır.",        set: 3, tekrar: "15",  dinlenme: 45 },
  { bolge: "Oblik",     hareket: "Side Plank",      aciklama: "30 saniye tut. Her iki taraf için.",           set: 3, tekrar: "30s", dinlenme: 45 },
];

const PROGRAM = {
  1: PUSH,        // Pazartesi
  2: PULL,        // Salı
  3: LEGS_CORE,   // Çarşamba
  4: PUSH,        // Perşembe
  5: PULL,        // Cuma
  6: LEGS_CORE,   // Cumartesi
  7: [],          // Pazar — dinlenme
};
// ============================================

const STORAGE_KEY = 'idman_state_v1';

function gunNo() {
  const d = new Date().getDay();
  return d === 0 ? 7 : d;
}

function bugunKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.tarih === bugunKey()) return s;
    }
  } catch (e) {}
  return {
    tarih: bugunKey(),
    gun: gunNo(),
    hareketIdx: 0,
    setIdx: 0,
    setBitisleri: [],
    baslangic: null,
    bitis: null,
  };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}

let state = loadState();
let timerInterval = null;
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
});

let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 0.6;
    const now = audioCtx.currentTime;
    [880, 1320].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, now + i * 0.25);
      gain.gain.linearRampToValueAtTime(0.3, now + i * 0.25 + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + i * 0.25 + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.25);
      osc.stop(now + i * 0.25 + dur);
    });
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  } catch (e) {}
}

function fmt(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function fmtSure(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return `${h}s ${m}d`;
  return `${m}d ${s}s`;
}

const GUN_ADI = ['', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];

function ytUrl(hareket) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(hareket + ' form')}`;
}

function render() {
  const main = document.getElementById('main');
  const bottom = document.getElementById('bottom');
  const dayInfo = document.getElementById('dayInfo');
  const progress = document.getElementById('progress');
  const footer = document.getElementById('footer');

  const program = PROGRAM[state.gun] || [];
  dayInfo.textContent = `${GUN_ADI[state.gun]} • Gün ${state.gun}`;
  footer.textContent = '';

  if (program.length === 0) {
    progress.textContent = '';
    main.innerHTML = `<div class="empty"><div class="big">😴</div>Bugün dinlenme.<br>Yarın ${GUN_ADI[state.gun === 7 ? 1 : state.gun + 1]}.</div>`;
    bottom.innerHTML = '';
    return;
  }

  if (state.hareketIdx >= program.length) {
    progress.textContent = 'TAMAM';
    renderOzet(program);
    return;
  }

  const hareket = program[state.hareketIdx];
  progress.textContent = `${state.hareketIdx + 1}/${program.length} • Set ${state.setIdx + 1}/${hareket.set}`;

  main.innerHTML = `
    <div class="bolge">${hareket.bolge}</div>
    <div class="hareket"><a class="hareket-link" href="${ytUrl(hareket.hareket)}" target="_blank" rel="noopener">${hareket.hareket}</a></div>
    <div class="hedef">${hareket.tekrar} tekrar × Set ${state.setIdx + 1}/${hareket.set}</div>
    <div class="aciklama">${hareket.aciklama}</div>
  `;

  bottom.innerHTML = `<button class="btn btn-start" id="startBtn">BAŞLA</button>`;
  document.getElementById('startBtn').addEventListener('click', onStart);
}

function onStart() {
  if (!state.baslangic) {
    state.baslangic = Date.now();
  }
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  requestWakeLock();
  saveState(state);

  const program = PROGRAM[state.gun];
  const hareket = program[state.hareketIdx];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="bolge">${hareket.bolge}</div>
    <div class="hareket"><a class="hareket-link" href="${ytUrl(hareket.hareket)}" target="_blank" rel="noopener">${hareket.hareket}</a></div>
    <div class="hedef">${hareket.tekrar} tekrar — Set ${state.setIdx + 1}/${hareket.set}</div>
    <div class="timer-label">Set süresi</div>
    <div class="timer" id="setTimer" style="color:#f59e0b;">0:00</div>
  `;
  document.getElementById('bottom').innerHTML = `<button class="btn btn-done" id="doneBtn">BİTTİ</button>`;
  document.getElementById('doneBtn').addEventListener('click', onDone);

  const setBaslangic = Date.now();
  const setTimerEl = document.getElementById('setTimer');
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const gecen = Math.floor((Date.now() - setBaslangic) / 1000);
    if (setTimerEl) setTimerEl.textContent = fmt(gecen);
  }, 1000);
}

function onDone() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const program = PROGRAM[state.gun];
  const hareket = program[state.hareketIdx];

  state.setBitisleri.push({
    hareketIdx: state.hareketIdx,
    hareket: hareket.hareket,
    setIdx: state.setIdx,
    ts: Date.now(),
  });

  state.setIdx++;
  if (state.setIdx >= hareket.set) {
    state.setIdx = 0;
    state.hareketIdx++;
  }

  if (state.hareketIdx >= program.length) {
    state.bitis = Date.now();
    saveState(state);
    render();
    return;
  }

  saveState(state);
  startDinlenme(hareket.dinlenme);
}

function startDinlenme(saniye) {
  let kalan = saniye;
  const main = document.getElementById('main');
  const bottom = document.getElementById('bottom');

  function tik() {
    main.innerHTML = `
      <div class="timer-label">Dinlenme</div>
      <div class="timer">${fmt(kalan)}</div>
      <div class="aciklama">Süre dolunca sıradaki set hazır.</div>
    `;
    bottom.innerHTML = `<button class="btn-skip" id="skipBtn">atla / şimdi devam et</button>`;
    document.getElementById('skipBtn').addEventListener('click', () => {
      clearInterval(timerInterval);
      timerInterval = null;
      render();
    });
  }

  tik();
  timerInterval = setInterval(() => {
    kalan--;
    if (kalan <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      beep();
      render();
      return;
    }
    tik();
  }, 1000);
}

function renderOzet(program) {
  const sayim = {};
  state.setBitisleri.forEach(b => {
    sayim[b.hareket] = (sayim[b.hareket] || 0) + 1;
  });

  const sure = state.bitis && state.baslangic ? state.bitis - state.baslangic : 0;
  const toplamSet = state.setBitisleri.length;

  let rows = '';
  program.forEach(h => {
    const yapilan = sayim[h.hareket] || 0;
    rows += `<div class="summary-row"><span class="name"><a href="${ytUrl(h.hareket)}" target="_blank" rel="noopener">${h.hareket}</a></span><span class="val">${yapilan}/${h.set} set</span></div>`;
  });

  document.getElementById('main').innerHTML = `
    <div class="summary">
      <h2>✓ Bugün tamam</h2>
      ${rows}
      <div class="summary-row summary-total"><span class="name">Toplam set</span><span class="val">${toplamSet}</span></div>
      <div class="summary-row"><span class="name">Süre</span><span class="val">${fmtSure(sure)}</span></div>
    </div>
  `;
  document.getElementById('bottom').innerHTML = '';
  document.getElementById('footer').innerHTML = `<a href="#" id="resetLink" style="color:#444;text-decoration:none;">sıfırla</a>`;
  document.getElementById('resetLink').addEventListener('click', (e) => {
    e.preventDefault();
    if (confirm('Bugünün ilerlemesini sıfırla?')) {
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      render();
    }
  });
}

window.addEventListener('beforeunload', () => {
  if (timerInterval) clearInterval(timerInterval);
  saveState(state);
});

// ============================================
// Modal control
// ============================================
function openModal(id) {
  const m = document.getElementById(id);
  if (m) m.hidden = false;
}
function closeModal(m) { m.hidden = true; }

document.getElementById('aboutBtn').addEventListener('click', () => openModal('aboutModal'));
document.getElementById('settingsBtn').addEventListener('click', () => openModal('settingsModal'));

document.querySelectorAll('.modal').forEach((m) => {
  m.querySelectorAll('[data-close]').forEach((el) => {
    el.addEventListener('click', () => closeModal(m));
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal:not([hidden])').forEach(closeModal);
  }
});

// ============================================
// PWA — service worker
// ============================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

render();
requestWakeLock();
</script>

</body>
</html>
